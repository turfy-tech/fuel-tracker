<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Check</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --check: #22c55e;
    --check-dark: #15803d;
    --check-bg: #052e16;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --muted: #888;
    --red: #ef4444;
    --red-bg: #2d0a0a;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }

  .header {
    background: var(--check-dark);
    padding: 1.5rem 1.75rem 1.25rem;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 20px;
    background: var(--surface);
    border-radius: 16px 16px 0 0;
  }

  .label-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 5px;
  }

  .machine-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    color: #fff;
  }

  .check-icon {
    position: absolute;
    top: 1.25rem; right: 1.5rem;
    font-size: 30px;
    opacity: 0.5;
  }

  .body { padding: 1.75rem; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .date-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--check); flex-shrink: 0; }
  .date-text { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
    margin-top: 1.1rem;
  }
  .field-label:first-child { margin-top: 0; }

  input[type="text"], textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: var(--check); }
  textarea { resize: none; height: 72px; font-size: 14px; }

  .checklist { display: flex; flex-direction: column; gap: 8px; }

  .check-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    transition: border-color 0.15s, background 0.15s;
  }

  .check-item-label {
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-group { display: flex; gap: 4px; }

  .toggle-btn {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.12s;
  }

  .toggle-btn.ok.active { background: #052e16; border-color: var(--check); color: var(--check); }
  .toggle-btn.defect.active { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .check-item.has-defect { border-color: var(--red); background: #1a0a0a; }

  .defect-warning {
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--red);
    margin-top: 10px;
    display: none;
    line-height: 1.5;
  }

  .submit-btn {
    width: 100%;
    background: var(--check-dark);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1.25rem;
    transition: filter 0.15s, transform 0.1s;
  }
  .submit-btn:hover { filter: brightness(1.15); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: #333; cursor: not-allowed; transform: none; filter: none; }

  .success-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.75rem;
    text-align: center;
  }

  .success-icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--check-bg);
    border: 1.5px solid var(--check);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1rem;
    font-size: 26px;
  }

  .success-title { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; color: var(--check); margin-bottom: 6px; }
  .success-sub { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }

  .summary-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    width: 100%;
    text-align: left;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 0;
    gap: 12px;
  }
  .summary-row span:first-child { color: var(--muted); flex-shrink: 0; }
  .summary-row span:last-child { font-family: 'IBM Plex Mono', monospace; font-weight: 500; color: var(--text); text-align: right; }
  .summary-row span.defect-flag { color: var(--red); }

  .another-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 0.75rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    margin-top: 1rem;
    width: 100%;
    transition: border-color 0.15s, color 0.15s;
  }
  .another-btn:hover { border-color: var(--check); color: var(--check); }

  .error-msg { font-size: 12px; color: var(--red); margin-top: 5px; display: none; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .powered { margin-top: 1.25rem; font-size: 11px; color: #333; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="check-icon">✅</div>
    <div class="label-tag">Circle Check</div>
    <div class="machine-name" id="machineDisplay">Machine —</div>
  </div>

  <div class="body" id="formBody">
    <div class="date-row">
      <div class="date-dot"></div>
      <div class="date-text" id="dateDisplay">—</div>
    </div>

    <div class="field-label">Staff Name</div>
    <input type="text" id="staffName" placeholder="Your name" autocomplete="name" />
    <div class="error-msg" id="staffError">Please enter your name.</div>

    <div class="field-label" style="margin-top:1.1rem;">Inspection Items</div>
    <div class="checklist" id="checklist"></div>

    <div class="defect-warning" id="defectWarning">
      ⚠ One or more defects noted — please report to your supervisor before operating this machine.
    </div>

    <div class="field-label">Other / Additional Notes</div>
    <textarea id="notes" placeholder="Any other observations..."></textarea>

    <button class="submit-btn" id="submitBtn" onclick="submitCheck()">Submit Circle Check</button>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-icon">✓</div>
    <div class="success-title">Submitted!</div>
    <div class="success-sub" id="successSub"></div>
    <div class="summary-box" id="summaryBox"></div>
    <button class="another-btn" onclick="resetForm()">Start New Check</button>
  </div>
</div>

<div class="powered">Circle Check v1.0</div>

<script>
  // ============================================================
  // CONFIGURATION
  // ============================================================
  const SHEET_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

  const CHECKLIST_ITEMS = [
    { id: "tires",    icon: "🔵", label: "Tire condition" },
    { id: "lights",   icon: "💡", label: "Lights working" },
    { id: "leaks",    icon: "💧", label: "Leaks / damage" },
    { id: "seatbelt", icon: "🔒", label: "Seatbelt / ROPS" },
    { id: "brakes",   icon: "🛑", label: "Brakes" },
    { id: "fuel",     icon: "⛽", label: "Fuel level" },
    { id: "reverse",  icon: "🔔", label: "Reverse alarm" },
  ];
  // ============================================================

  const machineId = new URLSearchParams(window.location.search).get('machine') || '1';
  const machineName = `Machine ${machineId}`;
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-CA');
  const timeStr = now.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });

  document.getElementById('machineDisplay').textContent = machineName;
  document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-CA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const checkState = {};
  const cl = document.getElementById('checklist');
  CHECKLIST_ITEMS.forEach(item => {
    cl.innerHTML += `
      <div class="check-item" id="ci-${item.id}">
        <div class="check-item-label"><span>${item.icon}</span> ${item.label}</div>
        <div class="toggle-group">
          <button class="toggle-btn ok" onclick="setCheck('${item.id}','ok')">OK</button>
          <button class="toggle-btn defect" onclick="setCheck('${item.id}','defect')">Defect</button>
        </div>
      </div>`;
  });

  function setCheck(id, val) {
    checkState[id] = val;
    const item = document.getElementById(`ci-${id}`);
    item.querySelectorAll('.toggle-btn')[0].classList.toggle('active', val === 'ok');
    item.querySelectorAll('.toggle-btn')[1].classList.toggle('active', val === 'defect');
    item.classList.toggle('has-defect', val === 'defect');
    document.getElementById('defectWarning').style.display =
      Object.values(checkState).includes('defect') ? 'block' : 'none';
  }

  async function submitCheck() {
    const staff = document.getElementById('staffName').value.trim();
    if (!staff) { document.getElementById('staffError').style.display = 'block'; return; }
    document.getElementById('staffError').style.display = 'none';

    const missing = CHECKLIST_ITEMS.filter(i => !checkState[i.id]);
    if (missing.length > 0) {
      alert(`Please check all items.\n\nMissing: ${missing.map(i => i.label).join(', ')}`);
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving...';

    const notes = document.getElementById('notes').value.trim();
    const defects = CHECKLIST_ITEMS.filter(i => checkState[i.id] === 'defect').map(i => i.label);

    const payload = {
      type: 'circle_check',
      machine: machineName,
      machineId,
      date: dateStr,
      time: timeStr,
      staff,
      checkState: JSON.stringify(checkState),
      defects: defects.join(', '),
      hasDefect: defects.length > 0,
      notes
    };

    try {
      if (SHEET_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
        await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      } else {
        await new Promise(r => setTimeout(r, 800));
        console.log("Demo:", payload);
      }
    } catch(e) { btn.disabled = false; btn.textContent = 'Submit Circle Check'; alert('Connection error. Please try again.'); return; }

    document.getElementById('successSub').textContent = `${machineName} · ${dateStr} at ${timeStr}`;

    let rows = `
      <div class="summary-row"><span>Staff</span><span>${staff}</span></div>
      <div class="summary-row"><span>Date</span><span>${dateStr}</span></div>
      <div class="summary-row"><span>Time</span><span>${timeStr}</span></div>
    `;
    CHECKLIST_ITEMS.forEach(i => {
      const ok = checkState[i.id] === 'ok';
      rows += `<div class="summary-row"><span>${i.label}</span><span class="${ok?'':'defect-flag'}">${ok ? '✓ OK' : '✗ Defect'}</span></div>`;
    });
    if (notes) rows += `<div class="summary-row"><span>Notes</span><span>${notes}</span></div>`;
    if (defects.length) rows += `<div class="summary-row"><span>Defects</span><span class="defect-flag">${defects.join(', ')}</span></div>`;

    document.getElementById('summaryBox').innerHTML = rows;
    document.getElementById('formBody').style.display = 'none';
    document.getElementById('successScreen').style.display = 'flex';
  }

  function resetForm() {
    document.getElementById('staffName').value = '';
    document.getElementById('notes').value = '';
    CHECKLIST_ITEMS.forEach(i => {
      delete checkState[i.id];
      const item = document.getElementById(`ci-${i.id}`);
      item.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      item.classList.remove('has-defect');
    });
    document.getElementById('defectWarning').style.display = 'none';
    const btn = document.getElementById('submitBtn');
    btn.disabled = false; btn.textContent = 'Submit Circle Check';
    document.getElementById('formBody').style.display = 'block';
    document.getElementById('successScreen').style.display = 'none';
  }
</script>
</body>
</html>
